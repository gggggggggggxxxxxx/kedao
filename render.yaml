services:
  - type: web
    name: kedao-assessment
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: KIMI_API_KEY
        sync: false   # 在 Render 控制台手动填写，不要写进此文件
      - key: KIMI_MODEL
        value: moonshot-v1-8k
